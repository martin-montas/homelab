---
- name: Create VM From Proxmox Template
  hosts: localhost
  connection: local
  become: no
  gather_facts: no
  vars:
    ansible_python_interpreter: /home/william/main-env/bin/python
  collections:
    - community.general
  vars_files:
    - vars.yaml
  tasks:
    - name: Create VM with Template with Cloud-Init
      community.general.proxmox_kvm:
        api_user: "{{ proxmox_api_user }}"
        api_password: "{{ proxmox_pass }}"
        api_host: "{{ proxmox_api_host }}"
        node: "{{ proxmox_node }}"
        vmid: "{{ template_vmid }}"
        clone: "{{ template_name }}"
        name: "{{ new_vm_name }}"
        newid: "{{ new_vm_id }}"
        format: qcow2
        full: true
        # Using lookup for SSH keys is correct
        sshkeys: "{{ lookup('ansible.builtin.file', '~/.ssh/id_rsa.pub') }}"
        cores: "{{ new_vm_cores }}"
        memory: "{{ new_vm_memory }}"
        storage: "{{ vm_storage }}"
        agent: 1
        citype: "nocloud"
        # Corrected ipconfig line:
        # Ensure static_ip_address includes the CIDR (e.g., "10.0.0.33/24")
        # Ensure static_dns_servers is a comma-separated string (e.g., "8.8.8.8,8.8.4.4")
        ipconfig:
          net0: "ip={{ static_ip_address }},gw={{ static_gateway }},nameserver={{ static_dns_servers }}"
        # Removed duplicate 'nameservers' parameter, it's covered by ipconfig
        state: present
        timeout: 1200
      register: new_vm

    - name: Prints the VM creation details
      debug:
        var: new_vm

    - name: Start the new VM
      community.general.proxmox_kvm:
        api_user: "{{ proxmox_api_user }}"
        api_password: "{{ proxmox_pass }}"
        api_host: "{{ proxmox_api_host }}"
        node: "{{ proxmox_node }}"
        vmid: "{{ new_vm_id }}"
        state: started
        timeout: 1200
      register: start_status

    - name: Prints the start of the vm status
      debug:
        var: start_status

    - name: Wait for VM to come up and be reachable
      ansible.builtin.wait_for_connection:
        timeout: 300 # Increased timeout for initial boot
      delegate_to: "{{ new_vm_name }}" # Delegate to the VM by its name

    - name: Verify IP address on eth0
      ansible.builtin.command: "ip -4 addr show eth0 | grep -oP '(?<=inet\\s)\\d+(\\.\\d+){3}'"
      register: vm_ip_output
      delegate_to: "{{ new_vm_name }}"
      changed_when: false
      # Compare against the IP part of static_ip_address
      failed_when: vm_ip_output.stdout.strip() != static_ip_address.split('/')[0]

    - name: Display confirmed VM IP address
      ansible.builtin.debug:
        msg: "VM {{ new_vm_name }} has IP: {{ vm_ip_output.stdout.strip() }}"
